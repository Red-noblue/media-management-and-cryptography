<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字媒体管理与古典破译交互实验工坊</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #11141a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1f2532 0%, #11141a 100%);
        }
        header h1 { margin: 0; font-size: 2.5rem; color: #4fc3f7; }
        header p { color: #8a99ad; margin-top: 10px; }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            gap: 30px;
            flex: 1;
        }
        .card {
            background: #1c2331;
            border: 1px solid #2e3b52;
            border-radius: 12px;
            width: calc(50% - 15px);
            min-width: 300px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s, border-color 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #4fc3f7;
        }
        .card.media { border-top: 5px solid #00e676; }
        .card.crypto { border-top: 5px solid #ff9100; }
        
        .card h2 { margin-top: 0; font-size: 1.8rem; }
        .card p { color: #b0bec5; line-height: 1.6; }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #4fc3f7;
            color: #11141a;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn:hover { background: #81d4fa; }
        .media .btn { background: #00e676; color: #11141a; }
        .media .btn:hover { background: #66ffa6; }
        .crypto .btn { background: #ff9100; color: #11141a; }
        .crypto .btn:hover { background: #ffb74d; }
    </style>
</head>
<body>

    <header>
        <h1>数字媒体管理与古典破译交互实验工坊</h1>
        <p>课程大作业 | 开发者：Red-noblue</p>
    </header>

    <div class="container">
        <div class="card media">
            <div>
                <h2>📁 案例一：数字媒体管理系统</h2>
                <p>本案例展示了现代数字资产（图片、音频、视频）的元数据管理、分类检索以及流媒体在线播放控制。通过前端交互模拟高效的资产盘点流转。 </p>
            </div>
            <a href="media.html" class="btn">进入系统 →</a>
        </div>

        <div class="card crypto">
            <div>
                <h2>🔐 案例二：古典密码破译矩阵</h2>
                <p>本案例聚焦于历史上的经典加密算法（如凯撒密码、维吉尼亚密码）。提供可视化的即时加解密演练，并包含频率分析法破译暗号的交互工具。</p>
            </div>
            <a href="crypto.html" class="btn">开始破译 →</a>
        </div>
    </div>

</body>
</html>
